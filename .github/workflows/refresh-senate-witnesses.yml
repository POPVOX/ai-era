name: Refresh Senate witness data

on:
  schedule:
    - cron: "42 13 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Senate witness data
        env:
          GOVINFO_API_KEY: ${{ secrets.GOVINFO_API_KEY }}
          SENATE_WITNESS_CONGRESSES: "119"
        run: npm run build:senate-witnesses

      - name: Link published hearings into Senate committees
        run: npm run link:senate-published-hearings && npm run build:senate-committee-pages

      - name: Run checks
        run: npm run check

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/senate-witness-data.json assets/senate-witness-data.js assets/senate-committee-data.json assets/senate-committee-data.js senate-witnesses senate-events senate-committees
          if git diff --cached --quiet; then
            echo "No refreshed Senate witness data to commit."
          else
            git commit -m "Refresh Senate witness data"
            git push
          fi
