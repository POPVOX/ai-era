name: Refresh Senate committee data

on:
  schedule:
    - cron: "18 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Senate committee data
        run: npm run build:senate-committees

      - name: Run checks
        run: npm run check

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/senate-committee-data.json assets/senate-committee-data.js
          if git diff --cached --quiet; then
            echo "No refreshed Senate committee data to commit."
          else
            git commit -m "Refresh Senate committee data"
            git push
          fi
