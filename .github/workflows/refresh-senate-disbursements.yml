name: Refresh Senate disbursement data

on:
  schedule:
    - cron: "42 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF parser
        run: python -m pip install -r requirements.txt

      - name: Build Senate disbursement data
        run: python scripts/build-senate-disbursement-data.py

      - name: Run checks
        run: npm run check

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/senate-disbursement-data.json assets/senate-disbursement-data.js
          if git diff --cached --quiet; then
            echo "No refreshed Senate disbursement data to commit."
          else
            git commit -m "Refresh Senate disbursement data"
            git push
          fi
